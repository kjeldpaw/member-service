# Keycloak Admin Client
# These properties are placeholders and should be configured as per environment
# quarkus.keycloak.admin-client.server-url=http://localhost:8081/auth
# quarkus.keycloak.admin-client.realm=quarkus
# quarkus.keycloak.admin-client.client-id=quarkus-app
# quarkus.keycloak.admin-client.grant-type=client_credentials
# quarkus.keycloak.admin-client.client-secret=secret

# Keycloak Dev Services
quarkus.keycloak.devservices.realm-path=wandywharang-realm.json
# Using default Keycloak Admin Client configuration for Dev Services

# Target realm for member registration
quarkus.keycloak.admin-client.realm-target=wandywharang

# Liquibase configuration
quarkus.liquibase.migrate-at-start=true
quarkus.liquibase.change-log=db/changelog/db.changelog-master.xml

# Hibernate configuration for Reactive Panache
quarkus.hibernate-orm.database.generation=none
